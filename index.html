<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#111111">
  <title>Sabores del Paseo · Menú</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    :root{
      --bg:#111;--bg2:#1A1A1A;--bg3:#222;--bg4:#2A2A2A;
      --acc:#E8621E;--acc2:#FF8C42;
      --text:#FFFFFF;--text2:#CCCCCC;--text3:#777777;
      --border:#2E2E2E;--wa:#25D366;--chat:#7C3AED;
      --f:'Poppins',sans-serif;
    }
    html,body{min-height:100%;overflow-x:hidden;background:var(--bg)}
    body{font-family:var(--f);color:var(--text)}
    a{text-decoration:none;color:inherit}
    button{font-family:var(--f);cursor:pointer}
    img{display:block;max-width:100%}

    /* HERO */
    .hero{position:relative;width:100%;background:var(--bg2)}
    .hero-banner-img{width:100%;height:180px;object-fit:cover;display:block}
    .hero-banner-grad{width:100%;height:180px;
      background:linear-gradient(135deg,#1A0A00 0%,#2D1206 50%,#1A0A00 100%);
      display:flex;align-items:center;justify-content:center;font-size:60px;opacity:.3}
    .hero-overlay{position:absolute;top:0;left:0;right:0;height:180px;
      background:linear-gradient(180deg,rgba(0,0,0,.2) 0%,rgba(17,17,17,1) 100%)}
    .hero-content{position:relative;padding:0 20px 24px;margin-top:-80px;
      display:flex;flex-direction:column;align-items:center;gap:10px}
    .hero-logo{width:90px;height:90px;object-fit:contain;border-radius:16px;
      background:white;padding:6px;box-shadow:0 4px 24px rgba(0,0,0,.7)}
    .hero-name{font-size:24px;font-weight:900;color:#fff;text-align:center;line-height:1.1}
    .hero-sub{font-size:12px;color:var(--text3);text-align:center;max-width:280px;line-height:1.4}
    .hero-badges{display:flex;gap:8px;flex-wrap:wrap;justify-content:center}
    .hbadge{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;
      border-radius:20px;font-size:11px;font-weight:700;letter-spacing:.3px}
    .hbadge.open{background:rgba(37,211,102,.12);color:#25D366;border:1px solid rgba(37,211,102,.25)}
    .hbadge.hr{background:var(--bg3);color:var(--text3);border:1px solid var(--border)}
    .hbadge.loc{background:var(--bg3);color:var(--text3);border:1px solid var(--border)}
    .hbadge .dot{width:6px;height:6px;border-radius:50%;background:currentColor;
      animation:blink 1.5s ease-in-out infinite}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}
    .hero-socials{display:flex;gap:14px}
    .hsoc{width:46px;height:46px;border-radius:50%;border:1px solid var(--border);
      background:var(--bg3);display:flex;align-items:center;justify-content:center;transition:all .2s}
    .hsoc:active{background:var(--bg4);transform:scale(.95)}

    /* STICKY TOP */
    .sticky-top{position:sticky;top:0;z-index:50;background:rgba(17,17,17,.97);
      backdrop-filter:blur(20px);border-bottom:1px solid var(--border)}
    .search-row{display:flex;align-items:center;padding:10px 16px;gap:10px}
    .sbox{flex:1;position:relative}
    .sbox input{width:100%;padding:10px 16px 10px 40px;
      background:var(--bg3);border:1px solid var(--border);border-radius:10px;
      font-family:var(--f);font-size:14px;color:var(--text);outline:none;
      -webkit-appearance:none}
    .sbox input::placeholder{color:var(--text3)}
    .sbox input:focus{border-color:var(--acc)}
    .sic{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text3);pointer-events:none}
    .cats-bar{display:flex;gap:8px;overflow-x:auto;padding:0 16px 10px;scrollbar-width:none}
    .cats-bar::-webkit-scrollbar{display:none}
    .cpill{flex-shrink:0;padding:7px 16px;border-radius:8px;border:1px solid var(--border);
      background:transparent;color:var(--text3);font-family:var(--f);
      font-size:13px;font-weight:600;white-space:nowrap;transition:all .15s}
    .cpill.on{background:#fff;color:#111;border-color:#fff}
    .cpill:not(.on):active{background:var(--bg3)}

    /* PRODUCT LIST */
    .menu{padding:0 0 130px}
    .cat-hdr{padding:22px 16px 10px;font-size:22px;font-weight:800;color:var(--text);
      border-top:3px solid var(--border);margin-top:4px}
    .cat-hdr:first-child{border-top:none;margin-top:0}
    .pitem{display:flex;align-items:center;gap:14px;
      padding:16px;border-bottom:1px solid var(--border);
      cursor:pointer;transition:background .12s;-webkit-tap-highlight-color:transparent}
    .pitem:active{background:var(--bg2)}
    .pitem.unavail{opacity:.45}
    .pimgw{flex-shrink:0;width:88px;height:88px;border-radius:12px;
      overflow:hidden;background:var(--bg3);position:relative}
    .pimgw img{width:100%;height:100%;object-fit:cover}
    .pbadge{position:absolute;bottom:4px;left:4px;
      background:var(--acc);color:white;font-size:8px;font-weight:800;
      padding:2px 7px;border-radius:4px;letter-spacing:.2px}
    .pinfo{flex:1;min-width:0}
    .pnm{font-size:15px;font-weight:700;color:var(--text);margin-bottom:3px;line-height:1.3}
    .pdesc{font-size:12px;color:var(--text3);line-height:1.5;
      overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;margin-bottom:7px}
    .ppr{font-size:16px;font-weight:800;color:var(--text)}
    .punavail-tag{font-size:11px;color:var(--acc);font-weight:600}
    .padd{flex-shrink:0;width:34px;height:34px;border-radius:50%;
      background:var(--bg3);border:1.5px solid var(--border);color:var(--text2);
      font-size:22px;font-weight:300;display:flex;align-items:center;justify-content:center;
      transition:all .2s;line-height:1}
    .pitem:not(.unavail) .padd:active{background:var(--acc);border-color:var(--acc);color:white;transform:scale(.9)}
    .empty{text-align:center;padding:60px 20px;color:var(--text3)}
    .empty .ei{font-size:48px;margin-bottom:12px}
    .empty h3{font-size:18px;font-weight:700;color:var(--text2);margin-bottom:6px}

    /* FABs */
    .fab-wa{position:fixed;bottom:24px;right:16px;z-index:200;
      background:var(--wa);color:white;border:none;border-radius:50px;
      padding:14px 20px;font-family:var(--f);font-size:14px;font-weight:700;
      display:flex;align-items:center;gap:8px;
      box-shadow:0 4px 20px rgba(37,211,102,.45)}
    .fab-wa:active{transform:scale(.95)}
    .fab-chat{position:fixed;bottom:24px;left:16px;z-index:200;
      background:var(--chat);color:white;border:none;border-radius:50px;
      padding:14px 20px;font-family:var(--f);font-size:14px;font-weight:700;
      display:flex;align-items:center;gap:8px;
      box-shadow:0 4px 20px rgba(124,58,237,.45)}
    .fab-chat:active{transform:scale(.95)}

    /* MODAL SHEET */
    .mback{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:300;
      display:flex;align-items:flex-end;animation:fadeIn .2s}
    @keyframes fadeIn{from{opacity:0}to{opacity:1}}
    @keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
    .psheet{background:var(--bg2);width:100%;max-height:93vh;
      border-radius:24px 24px 0 0;overflow-y:auto;animation:slideUp .32s ease}
    .psh-img{width:100%;height:240px;object-fit:cover;display:block;background:var(--bg3)}
    .psh-drag{width:40px;height:4px;background:var(--border);border-radius:2px;margin:14px auto 4px}
    .psh-body{padding:20px 16px 36px}
    .psh-badge{display:inline-block;background:var(--acc);color:white;
      font-size:10px;font-weight:800;padding:3px 10px;border-radius:4px;margin-bottom:10px}
    .psh-name{font-size:22px;font-weight:800;color:var(--text);margin-bottom:8px}
    .psh-desc{font-size:14px;color:var(--text2);line-height:1.7;margin-bottom:16px}
    .psh-price{font-size:28px;font-weight:900;color:var(--text);margin-bottom:20px}
    .psh-price small{font-size:14px;color:var(--text3);font-weight:500}
    .psh-unavail{background:var(--bg3);border:1px solid var(--border);
      color:var(--text3);padding:10px 14px;border-radius:10px;font-size:12px;font-weight:600;margin-bottom:16px}
    .btn-wa-full{width:100%;background:var(--wa);color:white;border:none;
      padding:16px;border-radius:14px;font-family:var(--f);font-size:16px;font-weight:700;
      display:flex;align-items:center;justify-content:center;gap:10px;
      box-shadow:0 4px 16px rgba(37,211,102,.3);margin-bottom:10px}
    .btn-wa-full:active{transform:scale(.98)}
    .btn-back-full{width:100%;background:var(--bg3);color:var(--text3);border:1px solid var(--border);
      padding:14px;border-radius:14px;font-family:var(--f);font-size:15px;font-weight:600}

    /* CONTACT */
    .csheet{background:var(--bg2);width:100%;max-height:85vh;
      border-radius:24px 24px 0 0;padding:24px 16px 40px;animation:slideUp .32s ease}
    .csheet h2{font-size:20px;font-weight:800;margin-bottom:6px}
    .csheet>p{font-size:13px;color:var(--text3);margin-bottom:20px}
    .copt{display:flex;align-items:center;gap:14px;padding:16px;
      background:var(--bg3);border:1px solid var(--border);border-radius:14px;
      margin-bottom:10px;text-decoration:none;transition:background .15s}
    .copt:active{background:var(--bg4)}
    .copt-ic{width:44px;height:44px;border-radius:12px;
      display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:22px}
    .copt-ic.g{background:rgba(37,211,102,.12)}
    .copt-ic.o{background:rgba(232,98,30,.12)}
    .copt-ic.p{background:rgba(124,58,237,.12)}
    .copt h3{font-size:15px;font-weight:700;color:var(--text)}
    .copt p{font-size:12px;color:var(--text3);margin:0}
    .btn-close{width:100%;background:var(--bg3);border:1px solid var(--border);
      color:var(--text3);padding:14px;border-radius:14px;
      font-family:var(--f);font-size:15px;font-weight:600;margin-top:6px}

    /* PIN */
    .pin-back{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:400;
      display:flex;align-items:center;justify-content:center;padding:20px;animation:fadeIn .2s}
    .pin-box{background:var(--bg2);width:100%;max-width:360px;
      border-radius:24px;padding:32px 24px;border:1px solid var(--border)}
    .pin-box h2{font-size:20px;font-weight:800;text-align:center;margin-bottom:6px}
    .pin-box p{font-size:13px;color:var(--text3);text-align:center;margin-bottom:24px}
    .pin-inp{width:100%;text-align:center;font-size:30px;font-weight:800;letter-spacing:10px;
      padding:14px;background:var(--bg3);border:1px solid var(--border);border-radius:14px;
      color:var(--text);font-family:var(--f);outline:none;margin-bottom:14px;
      -webkit-text-security:disc}
    .pin-inp:focus{border-color:var(--acc)}
    .pin-inp.err{border-color:#FF4444;animation:shake .3s}
    .pin-err-msg{color:#FF6B6B;text-align:center;font-size:12px;font-weight:600;margin-bottom:10px}
    @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
    .btn-pr{width:100%;background:var(--acc);color:white;border:none;
      padding:14px;border-radius:14px;font-family:var(--f);font-size:16px;font-weight:700;
      box-shadow:0 4px 16px rgba(232,98,30,.3);margin-bottom:8px}
    .btn-pr:active{transform:scale(.98)}
    .btn-gh{width:100%;background:transparent;border:1px solid var(--border);
      color:var(--text3);padding:13px;border-radius:14px;
      font-family:var(--f);font-size:15px;font-weight:600}

    /* CHAT */
    .chat-wrap{position:fixed;inset:0;z-index:400;
      display:flex;align-items:flex-end;justify-content:flex-start;
      padding:10px 0 90px 16px;pointer-events:all;
      background:rgba(0,0,0,.6);backdrop-filter:blur(4px);cursor:pointer}
    .chat-panel{width:calc(100% - 32px);max-width:380px;
      height:min(540px,calc(100vh - 110px));
      background:var(--bg2);border:1px solid var(--border);border-radius:20px;
      display:flex;flex-direction:column;overflow:hidden;cursor:default;
      box-shadow:0 20px 60px rgba(0,0,0,.8);animation:slideUp .3s ease}
    .chat-hdr{background:linear-gradient(135deg,#3B1FA8,#5B3ACD);
      padding:14px 16px;display:flex;align-items:center;gap:12px;flex-shrink:0}
    .chat-av{width:40px;height:40px;border-radius:12px;
      background:rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;font-size:20px}
    .chat-ti{flex:1}
    .chat-ti h3{font-size:14px;font-weight:700;color:white}
    .chat-ti p{font-size:11px;color:rgba(255,255,255,.6)}
    .chat-dot{width:8px;height:8px;border-radius:50%;background:#25D366;
      box-shadow:0 0 6px rgba(37,211,102,.7);animation:blink 1.5s infinite}
    .chat-x{width:34px;height:34px;background:rgba(255,255,255,.1);border:none;
      border-radius:50%;color:white;cursor:pointer;
      display:flex;align-items:center;justify-content:center;
      font-size:18px;font-weight:700;transition:all .2s}
    .chat-x:hover,.chat-x:focus{background:rgba(255,68,68,.35)}
    .chat-msgs{flex:1;overflow-y:auto;padding:14px;
      display:flex;flex-direction:column;gap:10px;
      scrollbar-width:thin;scrollbar-color:var(--border) transparent}
    .cmsg{max-width:84%;display:flex;flex-direction:column;gap:3px}
    .cmsg.u{align-self:flex-end;align-items:flex-end}
    .cmsg.b{align-self:flex-start;align-items:flex-start}
    .cmsg-bub{padding:10px 14px;border-radius:16px;font-size:13px;line-height:1.6;color:var(--text)}
    .cmsg.u .cmsg-bub{background:var(--acc);border-radius:16px 16px 4px 16px}
    .cmsg.b .cmsg-bub{background:var(--bg3);border:1px solid var(--border);border-radius:16px 16px 16px 4px}
    .cmsg-t{font-size:9px;color:var(--text3)}
    .typing{display:flex;gap:4px;padding:12px 14px;
      background:var(--bg3);border:1px solid var(--border);border-radius:16px 16px 16px 4px;width:fit-content}
    .typing span{width:7px;height:7px;background:var(--text3);border-radius:50%;
      animation:bounce 1.2s ease-in-out infinite}
    .typing span:nth-child(2){animation-delay:.2s}.typing span:nth-child(3){animation-delay:.4s}
    @keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}
    .chat-welcome{text-align:center;padding:20px 12px;display:flex;flex-direction:column;align-items:center;gap:8px}
    .chat-welcome .wi{font-size:36px}
    .chat-welcome h3{font-size:16px;font-weight:700}
    .chat-welcome p{font-size:12px;color:var(--text3);line-height:1.6;max-width:260px}
    .qbtns{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin-top:8px}
    .qbtn{background:var(--bg3);border:1px solid var(--border);color:var(--text2);
      padding:6px 12px;border-radius:8px;font-family:var(--f);font-size:11px;font-weight:600;
      cursor:pointer;transition:all .2s}
    .qbtn:hover{border-color:var(--acc);color:var(--acc)}
    .nokey{background:rgba(232,98,30,.08);border:1px solid rgba(232,98,30,.2);
      border-radius:12px;padding:14px;text-align:center;font-size:12px;color:var(--text3);line-height:1.7}
    .nokey strong{color:var(--acc);display:block;margin-bottom:4px}
    .chat-bar{padding:12px;border-top:1px solid var(--border);display:flex;gap:10px;align-items:center;flex-shrink:0}
    .chat-inp{flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:12px;
      padding:10px 14px;font-family:var(--f);font-size:13px;color:var(--text);outline:none}
    .chat-inp::placeholder{color:var(--text3)}
    .chat-inp:focus{border-color:var(--chat)}
    .chat-snd{width:40px;height:40px;flex-shrink:0;background:var(--chat);color:white;
      border:none;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;
      box-shadow:0 4px 12px rgba(124,58,237,.4)}
    .chat-snd:disabled{opacity:.4;cursor:not-allowed}

    /* ADMIN */
    .adm-hdr{background:rgba(17,17,17,.97);backdrop-filter:blur(16px);
      border-bottom:1px solid var(--border);padding:14px 16px;
      display:flex;align-items:center;justify-content:space-between;
      position:sticky;top:0;z-index:50}
    .adm-hdr h1{font-size:18px;font-weight:800}
    .admbtn{background:var(--bg3);border:1px solid var(--border);color:var(--text2);
      padding:8px 14px;border-radius:10px;font-size:12px;font-weight:600;
      font-family:var(--f);display:flex;align-items:center;gap:6px}
    .adm-cnt{max-width:640px;margin:0 auto;padding:20px 16px 120px}
    .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px}
    .stat{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:16px 10px;text-align:center}
    .snum{font-size:28px;font-weight:800;color:var(--acc)}
    .snum.g{color:var(--wa)}.snum.r{color:#FF4444}
    .slbl{font-size:10px;color:var(--text3);font-weight:700;text-transform:uppercase;letter-spacing:.4px}
    .adm-acts{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:24px}
    .aabtn{padding:13px;border-radius:12px;font-family:var(--f);font-size:13px;font-weight:700;
      display:flex;align-items:center;justify-content:center;gap:7px;border:none;transition:all .15s}
    .aabtn.pri{background:var(--acc);color:white;box-shadow:0 4px 14px rgba(232,98,30,.3);grid-column:span 2}
    .aabtn.gho{background:var(--bg3);color:var(--text2);border:1px solid var(--border)}
    .aabtn:active{transform:scale(.97)}
    .stit{font-size:16px;font-weight:800;margin-bottom:12px}
    .aprod{display:flex;align-items:center;gap:12px;padding:12px;
      background:var(--bg2);border:1px solid var(--border);border-radius:14px;margin-bottom:10px}
    .aprod-img{width:72px;height:72px;border-radius:10px;object-fit:cover;flex-shrink:0;background:var(--bg3)}
    .aprod-inf{flex:1;min-width:0}
    .anm{font-weight:700;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .apr{font-weight:800;font-size:13px;color:var(--acc)}
    .act{font-size:11px;color:var(--text3)}
    .aprod-btns{display:flex;gap:6px;flex-shrink:0}
    .ib{width:36px;height:36px;border:1px solid var(--border);border-radius:10px;
      background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:15px;transition:all .2s}
    .ib:active{transform:scale(.9)}

    /* FORM */
    .fb{position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:400;
      display:flex;align-items:flex-end;justify-content:center}
    .fp{background:var(--bg2);width:100%;max-width:640px;max-height:95vh;
      border-radius:24px 24px 0 0;overflow-y:auto;padding:24px 16px 20px;
      border-top:1px solid var(--border);animation:slideUp .35s}
    .fp h2{font-size:20px;font-weight:800;margin-bottom:20px}
    .fg{margin-bottom:16px}
    .fg label{display:block;font-size:11px;font-weight:700;color:var(--text3);
      margin-bottom:7px;text-transform:uppercase;letter-spacing:.6px}
    .fg input,.fg textarea,.fg select{width:100%;padding:13px 14px;
      background:var(--bg3);border:1px solid var(--border);border-radius:12px;
      font-family:var(--f);font-size:14px;color:var(--text);outline:none;
      -webkit-appearance:none}
    .fg input::placeholder,.fg textarea::placeholder{color:var(--text3)}
    .fg input:focus,.fg textarea:focus,.fg select:focus{border-color:var(--acc)}
    .fg select option{background:var(--bg2)}
    .fg textarea{min-height:80px;resize:vertical}
    .fg2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .trow{display:flex;align-items:center;justify-content:space-between;
      padding:13px 14px;background:var(--bg3);border:1px solid var(--border);border-radius:12px}
    .trow label{font-size:14px;font-weight:600;color:var(--text2)}
    .tgl{width:48px;height:26px;background:var(--border);border-radius:13px;
      position:relative;cursor:pointer;transition:background .22s;border:none}
    .tgl.on{background:var(--wa)}
    .tgl::after{content:'';width:20px;height:20px;background:white;border-radius:50%;
      position:absolute;top:3px;left:3px;transition:left .22s;box-shadow:0 1px 4px rgba(0,0,0,.3)}
    .tgl.on::after{left:25px}
    .fact{display:flex;gap:10px;margin-top:20px;padding-bottom:12px}
    .bcn{flex:1;background:var(--bg3);border:1px solid var(--border);color:var(--text3);
      padding:14px;border-radius:12px;font-family:var(--f);font-size:15px;font-weight:600}
    .bsv{flex:2;background:var(--acc);color:white;border:none;
      padding:14px;border-radius:12px;font-family:var(--f);font-size:15px;font-weight:700;
      box-shadow:0 4px 14px rgba(232,98,30,.3)}
    .bsv:active{transform:scale(.98)}
    .ssec{font-size:11px;font-weight:800;color:var(--acc);text-transform:uppercase;
      letter-spacing:.7px;margin:20px 0 10px;padding-top:16px;border-top:1px solid var(--border)}
    .ssec:first-child{border-top:none;margin-top:0;padding-top:0}
    .knote{background:rgba(124,58,237,.1);border:1px solid rgba(124,58,237,.2);
      border-radius:12px;padding:12px;font-size:12px;color:var(--text3);line-height:1.6;margin-bottom:14px}
    .knote a{color:#7C3AED}
    .lpw{width:80px;height:80px;border-radius:14px;overflow:hidden;
      background:white;display:none;margin-bottom:10px;border:2px solid var(--border)}
    .lpw.show{display:block}
    .lpw img{width:100%;height:100%;object-fit:contain;padding:4px}
    .bpw{width:100%;height:80px;border-radius:12px;object-fit:cover;display:none;margin-bottom:8px}
    .bpw.show{display:block}

    /* TOAST */
    .toast{position:fixed;top:80px;left:50%;transform:translateX(-50%);
      background:var(--bg2);border:1px solid var(--border);color:var(--text);
      padding:11px 22px;border-radius:12px;font-size:13px;font-weight:600;z-index:1000;
      box-shadow:0 8px 32px rgba(0,0,0,.5);animation:toastIn .3s,toastOut .3s 2.7s forwards;white-space:nowrap}
    @keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(-16px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
    @keyframes toastOut{to{opacity:0;transform:translateX(-50%) translateY(-16px)}}
  </style>
</head>

const BACK_IC=`<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>`;
const EXIT_IC=`<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>`;

// RENDER
function render(){document.getElementById('app').innerHTML=st.view==='catalog'?renderCatalog():renderAdmin();bind();}

function renderCatalog(){
  const c=st.cfg, nom=c.nombre||DS.nombre, tag=c.tagline||DS.tagline;
  const logo=c.logoUrl||LOGO_DEFAULT, banner=c.bannerUrl||'', wa=c.whatsapp||DS.whatsapp, tel=c.telefono||DS.telefono;
  const cats=['Todos',...(c.categorias||DS.categorias)];
  const fil=st.prods.filter(p=>{
    const mc=st.cat==='Todos'||p.categoria===st.cat;
    const mq=!st.q||p.nombre.toLowerCase().includes(st.q.toLowerCase())||(p.descripcion||'').toLowerCase().includes(st.q.toLowerCase());
    return mc&&mq;
  });
  // Group by category for list view
  const groups={};
  if(st.cat!=='Todos'){groups[st.cat]=fil;}
  else{(c.categorias||DS.categorias).forEach(cat=>{const ps=fil.filter(p=>p.categoria===cat);if(ps.length)groups[cat]=ps;});}

  return `
  <div class="hero">
    ${banner?`<img class="hero-banner-img" src="${esc(banner)}" alt="banner" onerror="this.style.display='none'">`:`<div class="hero-banner-grad"></div>`}
    <div class="hero-overlay"></div>
    <div class="hero-content">
      <img class="hero-logo" src="${esc(logo)}" alt="${esc(nom)}" onerror="this.src='${LOGO_DEFAULT}'">
      <h1 class="hero-name">${esc(nom)}</h1>
      <p class="hero-sub">${esc(tag)}</p>
      <div class="hero-badges">
        <span class="hbadge open"><span class="dot"></span>ABIERTO</span>
        <span class="hbadge hr">⏰ ${esc(c.horario||DS.horario)}</span>
        <span class="hbadge loc">📍 ${esc((c.direccion||DS.direccion).split(',')[0])}</span>
      </div>
      <div class="hero-socials">
        <a class="hsoc" href="https://wa.me/${wa}?text=${encodeURIComponent('Hola! Me gustaría hacer un pedido')}" target="_blank">${WA_IC}</a>
        <a class="hsoc" href="tel:${tel}" style="font-size:20px">📞</a>
        <button class="hsoc" id="j-contact" style="font-size:20px">☰</button>
      </div>
    </div>
  </div>

  <div class="sticky-top">
    <div class="search-row">
      <div class="sbox">
        <span class="sic"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></span>
        <input type="search" id="j-search" placeholder="Buscar platillo…" value="${esc(st.q)}" autocomplete="off">
      </div>
    </div>
    <div class="cats-bar">
      ${cats.map(c=>`<button class="cpill${st.cat===c?' on':''}" data-cat="${esc(c)}">${esc(c)}</button>`).join('')}
    </div>
  </div>

  <div class="menu">
    ${fil.length===0
      ?`<div class="empty"><div class="ei">🍽️</div><h3>Sin resultados</h3><p style="color:#666">Intenta otra búsqueda o categoría</p></div>`
      :Object.entries(groups).map(([cat,ps])=>`
        <div class="cat-hdr">${esc(cat)}</div>
        ${ps.map(p=>renderItem(p)).join('')}
      `).join('')}
  </div>

  <button class="fab-wa" id="j-fab-wa">${WA_IC} WhatsApp</button>
  <button class="fab-chat" id="j-fab-chat">${ROBOT_IC} Asistente</button>

  ${st.showProd&&st.prod?renderSheet(st.prod):''}
  ${st.showContact?renderContact():''}
  ${st.showLogin?renderPin():''}
  ${st.showChat?renderChat():''}
  `
}

function renderItem(p){
  return `<div class="pitem${p.disponible?'':' unavail'}" data-pid="${p.id}">
    <div class="pimgw">
      <img src="${esc(p.imagen)}" alt="${esc(p.nombre)}"
           loading="lazy"
           onerror="this.src='https://placehold.co/88x88/222/666?text=🍖'">
      ${p.badge?`<div class="pbadge">${esc(p.badge)}</div>`:''}
    </div>
    <div class="pinfo">
      <div class="pnm">${esc(p.nombre)}</div>
      <div class="pdesc">${esc(p.descripcion||'')}</div>
      <div class="ppr">${p.disponible?`$${parseFloat(p.precio).toFixed(0)} <span style="font-size:12px;color:#666;font-weight:500;">MXN</span>`:`<span class="punavail-tag">No disponible</span>`}</div>
    </div>
    <button class="padd" data-pid="${p.id}" ${!p.disponible?'disabled':''}>+</button>
  </div>`;
}

function renderSheet(p){

  return `<div class="mback" id="j-mback">
    <div class="psheet" id="j-psheet">
      ${p.imagen?`<img class="psh-img" src="${esc(p.imagen)}" alt="${esc(p.nombre)}" onerror="this.style.display='none'">`:''}
      <div class="psh-drag"></div>
      <div class="psh-body">
        ${p.badge?`<div class="psh-badge">${esc(p.badge)}</div>`:''}

        <p class="psh-desc">${esc(p.descripcion||'')}</p>
        <div class="psh-price">$${parseFloat(p.precio).toFixed(2)} <small>MXN</small></div>
        ${!p.disponible?`<div class="psh-unavail">⚠️ No disponible en este momento</div>`:''}

}

function renderPin(){

      <h2>🔐 Administrador</h2>
      <p>Ingresa tu PIN de acceso</p>

function renderChat(){
  const hasKey=!!(st.cfg.apiKey||'').trim();
  const msgs=st.msgs.map(m=>`<div class="cmsg ${m.role==='user'?'u':'b'}">
    <div class="cmsg-bub">${esc(m.content)}</div>
    <div class="cmsg-t">${m.time||''}</div>
  </div>`).join('');
  const wel=st.msgs.length===0?`<div class="chat-welcome">
    <div class="wi">🤖</div>
    <h3>Hola, soy Gurmi</h3>
    <p>Asistente de ${esc(st.cfg.nombre||DS.nombre)}. Pregúntame lo que necesites.</p>
    ${hasKey?`<div class="qbtns">
      <button class="qbtn" data-q="¿Cuál es el horario?">⏰ Horario</button>
      <button class="qbtn" data-q="¿Cuáles son sus precios?">💰 Precios</button>
      <button class="qbtn" data-q="¿Qué platillos tienen?">🍖 Menú</button>
      <button class="qbtn" data-q="¿Cómo hago un pedido?">📦 Pedidos</button>
    </div>`:`<div class="nokey"><strong>⚙️ API Key no configurada</strong>Ve al Admin → Configuración y agrega tu API Key de Anthropic para activar el asistente.</div>`}
  </div>`:'';
  const typing=st.loading?`<div class="cmsg b"><div class="typing"><span></span><span></span><span></span></div></div>`:'';
  return `<div class="chat-wrap" id="j-chat-wrap">
    <div class="chat-panel" id="j-chat-panel">
      <div class="chat-hdr">
        <div class="chat-av">🤖</div>
        <div class="chat-ti"><h3>Gurmi · Asistente Virtual</h3><p>${esc(st.cfg.nombre||DS.nombre)}</p></div>
        <div class="chat-dot"></div>
        <button class="chat-x" id="j-chat-x" aria-label="Cerrar">${CLOSE_IC}</button>
      </div>
      <div class="chat-msgs" id="chat-msgs">${wel}${msgs}${typing}</div>
      <div class="chat-bar">
        <input class="chat-inp" id="chat-inp" placeholder="${hasKey?'Escribe tu pregunta…':'Configura el API Key primero'}" autocomplete="off" ${!hasKey?'disabled':''}>
        <button class="chat-snd" id="chat-snd" ${(st.loading||!hasKey)?'disabled':''}>${SEND_IC}</button>
      </div>
    </div>
  </div>`;
}

// EVENTS
function bind(){
  q('#j-search',el=>el.addEventListener('input',e=>{st.q=e.target.value;render();}));
  q('#j-contact',el=>el.addEventListener('click',()=>{st.showContact=true;render();}));
  q('#j-fab-wa',el=>el.addEventListener('click',()=>{
    const wa=st.cfg.whatsapp||DS.whatsapp;
    open(`https://wa.me/${wa}?text=${encodeURIComponent('Hola! Me gustaría hacer un pedido 🍖')}`, '_blank');
  }));
  q('#j-fab-chat',el=>el.addEventListener('click',()=>{st.showChat=true;render();setTimeout(scrollChat,80);}));
  all('.cpill',el=>el.addEventListener('click',()=>{st.cat=el.dataset.cat;render();}));
  all('.pitem',el=>el.addEventListener('click',e=>{
    if(e.target.classList.contains('padd'))return;
    openProd(el.dataset.pid);
  }));
  all('.padd',el=>el.addEventListener('click',e=>{e.stopPropagation();openProd(el.dataset.pid);}));
  // Sheet
  q('#j-mback',el=>el.addEventListener('click',e=>{if(e.target===el)closeSheet();}));
  q('#j-sh-close',el=>el.addEventListener('click',closeSheet));
  // Contact
  q('#j-cback',el=>el.addEventListener('click',e=>{if(e.target===el)closeContact();}));
  q('#j-cclose',el=>el.addEventListener('click',closeContact));
  q('#j-go-admin',el=>el.addEventListener('click',()=>{
    st.showContact=false;
    if(st.adminOk){st.view='admin';}else{st.showLogin=true;}
    render();
  }));
  // PIN
  q('#j-pin',el=>{
    el.addEventListener('input',e=>{st.pin=e.target.value;});
    el.addEventListener('keydown',e=>{if(e.key==='Enter')doPin();});
    setTimeout(()=>el.focus(),80);
  });
  q('#j-pinok',el=>el.addEventListener('click',doPin));
  q('#j-pincan',el=>el.addEventListener('click',()=>{st.showLogin=false;st.pin='';st.pinErr=false;render();}));
  q('#j-pback',el=>el.addEventListener('click',e=>{if(e.target===el){st.showLogin=false;st.pin='';render();}}));
  // Chat
  q('#j-chat-x',el=>el.addEventListener('click',()=>{st.showChat=false;render();}));
  q('#j-chat-wrap',el=>el.addEventListener('click',e=>{if(e.target===el){st.showChat=false;render();}}));
  bindChat();
  // Admin
  q('#j-ab',el=>el.addEventListener('click',()=>{st.view='catalog';render();}));
  q('#j-out',el=>el.addEventListener('click',()=>{st.adminOk=false;st.view='catalog';render();}));
  q('#j-add',el=>el.addEventListener('click',()=>{st.editing={disponible:true};fDisp=true;st.showForm=true;render();}));
  q('#j-csv',el=>el.addEventListener('click',doCSV));
  q('#j-cfg',el=>el.addEventListener('click',()=>{st.showSettings=true;render();}));
  all('[data-tg]',el=>el.addEventListener('click',()=>{const p=st.prods.find(x=>x.id===el.dataset.tg);if(p){p.disponible=!p.disponible;saveP();toast(p.disponible?'✅ Disponible':'❌ Agotado');render();}}));
  all('[data-ed]',el=>el.addEventListener('click',()=>{st.editing={...st.prods.find(x=>x.id===el.dataset.ed)};fDisp=st.editing.disponible!==false;st.showForm=true;render();}));
  all('[data-dl]',el=>el.addEventListener('click',()=>{const p=st.prods.find(x=>x.id===el.dataset.dl);if(p&&confirm(`¿Eliminar "${p.nombre}"?`)){st.prods=st.prods.filter(x=>x.id!==el.dataset.dl);saveP();toast('🗑️ Eliminado');render();}}));
  // Form
  q('#ff-tgl',el=>el.addEventListener('click',()=>{fDisp=!fDisp;el.classList.toggle('on',fDisp);}));
  q('#j-fcan',el=>el.addEventListener('click',()=>{st.showForm=false;st.editing=null;render();}));
  q('#j-fsav',el=>el.addEventListener('click',doSaveProduct));
  // Settings
  q('#sf-logo',el=>el.addEventListener('input',e=>{
    const prev=document.getElementById('logo-prev'), wrap=document.getElementById('lpw');
    if(prev&&wrap){prev.src=e.target.value||LOGO_DEFAULT;wrap.classList.add('show');}
  }));
  q('#sf-banner',el=>el.addEventListener('input',e=>{
    const prev=document.getElementById('banner-prev');
    if(prev){prev.src=e.target.value;prev.classList.toggle('show',!!e.target.value);}
  }));
  q('#j-scan',el=>el.addEventListener('click',()=>{st.showSettings=false;render();}));
  q('#j-ssav',el=>el.addEventListener('click',doSaveSettings));
}

function bindChat(){
  q('#chat-inp',el=>{
    el.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();doSend();}});
  });
  q('#chat-snd',el=>el.addEventListener('click',doSend));
  all('.qbtn',el=>el.addEventListener('click',()=>sendChat(el.dataset.q)));
}

// ACTIONS
function openProd(id){st.prod=st.prods.find(p=>p.id===id);if(st.prod){st.showProd=true;render();}}
function closeSheet(){st.showProd=false;st.prod=null;render();}
function closeContact(){st.showContact=false;render();}
function scrollChat(){const b=document.getElementById('chat-msgs');if(b)b.scrollTop=b.scrollHeight;}

function doPin(){
  const correct=st.cfg.pin||DS.pin;
  if(st.pin===correct){st.adminOk=true;st.showLogin=false;st.pin='';st.pinErr=false;st.view='admin';render();}
  else{st.pinErr=true;st.pin='';render();setTimeout(()=>{st.pinErr=false;const e=document.getElementById('j-pin');if(e){e.classList.remove('err');e.focus();}},900);}
}

function doSaveProduct(){
  const nom=(document.getElementById('ff-n')?.value||'').trim();
  const pre=parseFloat(document.getElementById('ff-p')?.value||'0');
  const cat=document.getElementById('ff-c')?.value||'';
  const desc=(document.getElementById('ff-d')?.value||'').trim();
  const img=(document.getElementById('ff-i')?.value||'').trim();
  const badge=(document.getElementById('ff-b')?.value||'').trim();
  if(!nom){alert('El nombre es obligatorio.');return;}
  if(isNaN(pre)||pre<0){alert('El precio debe ser válido.');return;}
  const prod={id:st.editing?.id||'p'+Date.now(),nombre:nom,categoria:cat,descripcion:desc,precio:pre,
    imagen:img||'https://placehold.co/400x400/222/666?text=🍖',badge,disponible:fDisp};
  if(st.editing?.id){const i=st.prods.findIndex(p=>p.id===st.editing.id);if(i!==-1)st.prods[i]=prod;toast('✅ Actualizado');}
  else{st.prods.push(prod);toast('✅ Agregado');}
  saveP();st.showForm=false;st.editing=null;render();
}

function doSaveSettings(){
  const nom=(document.getElementById('sf-nom')?.value||'').trim();
  if(!nom){alert('El nombre es obligatorio.');return;}
  Object.assign(st.cfg,{
    nombre:nom,
    tagline:(document.getElementById('sf-tag')?.value||'').trim(),
    whatsapp:(document.getElementById('sf-wa')?.value||'').trim(),
    telefono:(document.getElementById('sf-tel')?.value||'').trim(),
    direccion:(document.getElementById('sf-dir')?.value||'').trim(),
    horario:(document.getElementById('sf-hor')?.value||'').trim(),
    descripcion:(document.getElementById('sf-desc')?.value||'').trim(),
    logoUrl:(document.getElementById('sf-logo')?.value||'').trim(),
    bannerUrl:(document.getElementById('sf-banner')?.value||'').trim(),
  });
  const key=(document.getElementById('sf-key')?.value||'').trim();
  if(key)st.cfg.apiKey=key;
  const pin=(document.getElementById('sf-pin')?.value||'').trim();
  if(pin)st.cfg.pin=pin;
  const cats=(document.getElementById('sf-cats')?.value||'').split(',').map(c=>c.trim()).filter(Boolean);
  if(cats.length)st.cfg.categorias=cats;
  saveCfg();st.showSettings=false;toast('✅ Configuración guardada');render();
}

function doCSV(){
  const cols=['ID','Nombre','Categoría','Precio','Disponible','Descripción','Badge'];
  const rows=st.prods.map(p=>[p.id,p.nombre,p.categoria,p.precio,p.disponible?'Sí':'No',p.descripcion||'',p.badge||'']);
  const csv=[cols,...rows].map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob), a=document.createElement('a');
  a.href=url;a.download=`menu_${new Date().toISOString().slice(0,10)}.csv`;a.click();
  URL.revokeObjectURL(url);toast('📊 CSV exportado');
}

// CHAT
function buildSys(){
  const c=st.cfg;
  const menu=st.prods.map(p=>`• ${p.nombre} ($${p.precio} MXN) — ${p.disponible?'Disponible':'Agotado'}`).join('\n');
  return `Eres "Gurmi", asistente virtual de "${c.nombre||DS.nombre}" en Chihuahua, México.
HORARIO: ${c.horario||DS.horario}
TELÉFONO: ${c.telefono||DS.telefono}
DIRECCIÓN: ${c.direccion||DS.direccion}
DESCRIPCIÓN: ${c.descripcion||DS.descripcion}
MENÚ:\n${menu}
REGLAS: Responde en español, amable, máximo 3 oraciones. Para pedidos invita a WhatsApp al ${c.telefono||DS.telefono}. No inventes info. Eres Gurmi.`;
}

function doSend(){
  const inp=document.getElementById('chat-inp');
  if(!inp)return;
  const msg=inp.value.trim();
  if(!msg)return;
  inp.value='';
  sendChat(msg);
}

async function sendChat(userMsg){
  if(!userMsg.trim()||st.loading)return;
  const apiKey=(st.cfg.apiKey||'').trim();
  if(!apiKey){toast('⚙️ Configura tu API Key en Ajustes');return;}
  const now=new Date().toLocaleTimeString('es',{hour:'2-digit',minute:'2-digit'});
  st.msgs.push({role:'user',content:userMsg,time:now});
  st.loading=true;
  updateChat();scrollChat();
  try{
    const apiMsgs=st.msgs.filter(m=>m.role==='user'||m.role==='assistant').map(m=>({role:m.role,content:m.content}));
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:300,system:buildSys(),messages:apiMsgs})
    });
    if(!res.ok){const e=await res.json().catch(()=>({}));throw new Error(e.error?.message||`HTTP ${res.status}`);}
    const data=await res.json();
    const reply=data.content?.[0]?.text||'No pude procesar tu pregunta.';
    const nowR=new Date().toLocaleTimeString('es',{hour:'2-digit',minute:'2-digit'});
    st.msgs.push({role:'assistant',content:reply,time:nowR});
  }catch(e){
    const msg=e.message?.includes('401')||e.message?.includes('invalid_api_key')
      ?'API Key inválida. Verifica en Configuración.':'Error de conexión. Intenta de nuevo.';
    st.msgs.push({role:'assistant',content:msg,time:'--:--'});
  }
  st.loading=false;
  updateChat();scrollChat();
}

function updateChat(){
  const msgs=st.msgs.map(m=>`<div class="cmsg ${m.role==='user'?'u':'b'}">
    <div class="cmsg-bub">${esc(m.content)}</div>
    <div class="cmsg-t">${m.time||''}</div>
  </div>`).join('');
  const typing=st.loading?`<div class="cmsg b"><div class="typing"><span></span><span></span><span></span></div></div>`:'';
  const box=document.getElementById('chat-msgs');
  if(box)box.innerHTML=msgs+typing;
  const snd=document.getElementById('chat-snd');
  if(snd)snd.disabled=st.loading;
  bindChat();
}

// UTILS
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function q(sel,fn){const el=document.querySelector(sel);if(el)fn(el);}
function all(sel,fn){document.querySelectorAll(sel).forEach(fn);}
function toast(msg){const d=document.createElement('div');d.className='toast';d.textContent=msg;document.getElementById('toasts').appendChild(d);setTimeout(()=>d.remove(),3000);}

load();render();
</script>
